<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FABulous – Dashboard</title>
  <link rel="icon" type="image/png" href="../images/Top_Left_Nav_Logo.png" />
  <link rel="shortcut icon" type="image/png" href="../images/Top_Left_Nav_Logo.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../post/post.css" />
</head>
<body>

  <!-- ── TOP NAV ── -->
  <nav class="topnav">
    <img src="../images/Top_Left_Nav_Logo.png" alt="FABulous Logo" class="nav-logo" />

    <div class="nav-links">
      <a href="#" class="nav-item active">Home</a>
      <a href="#" class="nav-item">Commissions</a>
    </div>

    <button class="hamburger-btn" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- ── PAGE BODY ── -->
  <div class="page-body">

    <!-- ── LEFT SIDEBAR ── -->
    <aside class="sidebar">
      <!-- Profile -->
      <div class="profile-section">
        <div class="avatar-placeholder">
          <!-- Silhouette icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="avatar-icon">
            <circle cx="50" cy="35" r="22" fill="#1a1a1a"/>
            <ellipse cx="50" cy="85" rx="35" ry="25" fill="#1a1a1a"/>
          </svg>
        </div>
        <p class="profile-username">Username</p>
        <p class="profile-email">@Email</p>
      </div>

      <!-- Sidebar Nav -->
      <nav class="sidebar-nav">
        <a href="#" class="sidebar-link active">News Feed</a>
        <a href="#" class="sidebar-link">Messages</a>
        <a href="#" class="sidebar-link">Settings</a>
      </nav>
    </aside>

    <!-- ── MAIN FEED ── -->
    <main class="feed">
      <!-- Post Card 1 -->
      <div class="post-card">
        <span class="post-label">POST</span>
      </div>

      <!-- Post Card 2 -->
      <div class="post-card">
        <span class="post-label">POST</span>
      </div>

      <!-- Post Card 3 -->
      <div class="post-card">
        <span class="post-label">POST</span>
      </div>
    </main>

    <!-- ── RIGHT NOTIF PANEL ── -->
    <aside class="notif-panel">
      <div class="notif-card">
        <span class="notif-label">NOTIF</span>
      </div>
    </aside>

  </div><!-- end page-body -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
